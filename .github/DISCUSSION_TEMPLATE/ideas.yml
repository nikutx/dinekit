title: "[Feature request] "
labels: ["feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        **Before you post:** search [existing ideas](https://github.com/nikutx/dinekit/discussions/categories/ideas) first — if your idea is already there, **upvote it** instead of opening a duplicate. Upvotes are how we prioritise the roadmap. One idea per post, please.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the real situation in your restaurant/café/takeaway — not the solution yet. "During Friday service we can't…"
      placeholder: e.g. We take deposits for parties of 6+, but chasing no-shows by hand takes an hour a week.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: How do you imagine DineKit solving it?
      description: Your ideal solution. Rough is fine — we care about the outcome you want.
    validations:
      required: true
  - type: dropdown
    id: business
    attributes:
      label: What kind of business is this for?
      options:
        - Full-service restaurant
        - Café / coffee shop
        - Takeaway / delivery
        - Pub / bar
        - Multi-site / group
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing ideas and this isn't a duplicate
          required: true
        - label: This is one single idea (I'll open separate posts for others)
          required: true
